<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Reset Successful | ShopEase</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --primary-color: #302551;
    }
  </style>
</head>
<body class="bg-gray-100 font-sans">
  <header>
    {% if messages %} {% for message in messages %}
      <div
        id="flashMessage"
        class="fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded shadow-lg text-white text-sm font-semibold z-50 transition-all duration-500 backdrop-blur-md bg-opacity-80"
        style="background-color:
          {% if message.tags == 'success' %}#16a34a
          {% elif message.tags == 'error' %}#dc2626
          {% elif message.tags == 'warning' %}#f59e0b
          {% else %}#2563eb
          {% endif %};"
      >
        {{ message }}
      </div>
  
      <script>
        setTimeout(() => {
          const msg = document.getElementById("flashMessage");
          if (msg) msg.style.opacity = "0";
        }, 4000);
      </script>
      {% endfor %} {% endif %}
  </header>

<div class="flex items-center justify-center min-h-screen">
  <div class="bg-white shadow-2xl rounded-lg w-full max-w-md p-8 text-center">

    <h2 class="text-2xl font-bold text-[color:var(--primary-color)] mb-4">
      Password Reset Successful
    </h2>

    <p class="text-gray-600 text-sm mb-6">
      Your password has been updated.
    </p>

    <a href="{% url 'Login' %}"
       class="inline-block py-2 px-6 bg-[color:var(--primary-color)]
              text-white font-semibold rounded-md
              hover:bg-[#241b3d] transition">
      Login
    </a>

  </div>
</div>

</body>
</html>
