<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password | ShopEase</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --primary-color: #302551;
      --primary-hover: #241b3d;
    }
  </style>
</head>
<body class="bg-gray-100 font-sans">
  <header>
    {% if messages %} {% for message in messages %}
    <div
      id="flashMessage"
      class="fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded shadow-lg text-white text-sm font-semibold z-50 transition-all duration-500 backdrop-blur-md bg-opacity-80"
      style="background-color:
        {% if message.tags == 'success' %}#16a34a
        {% elif message.tags == 'error' %}#dc2626
        {% elif message.tags == 'warning' %}#f59e0b
        {% else %}#2563eb
        {% endif %};"
    >
      {{ message }}
    </div>

    <script>
      setTimeout(() => {
        const msg = document.getElementById("flashMessage");
        if (msg) msg.style.opacity = "0";
      }, 4000);
    </script>
    {% endfor %} {% endif %}
  </header>

<div class="flex items-center justify-center min-h-screen">
  <div class="bg-white shadow-2xl rounded-lg w-full max-w-md p-8">

    <h2 class="text-3xl font-bold text-center text-[color:var(--primary-color)] mb-4">
      Forgot Password?
    </h2>

    <p class="text-sm text-gray-600 text-center mb-6">
      Enter your email and we’ll send you a reset link.
    </p>

    <form method="post" class="space-y-6">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-medium text-gray-700">
          Email Address
        </label>
        <input type="email" name="email" required
          class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md
                 focus:ring-[color:var(--primary-color)]
                 focus:border-[color:var(--primary-color)] shadow-sm">
      </div>

      <button type="submit"
        class="w-full py-2 px-4 bg-[color:var(--primary-color)]
               text-white font-semibold rounded-md
               hover:bg-[color:var(--primary-hover)] transition">
        Send Reset Link
      </button>
    </form>

    <p class="text-center text-sm text-gray-600 mt-6">
      Remember your password?
      <a href="{% url 'Login' %}"
         class="text-[color:var(--primary-color)] hover:underline">
        Login
      </a>
    </p>

  </div>
</div>

</body>
</html>
