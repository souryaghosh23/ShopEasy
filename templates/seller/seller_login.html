{% load static %}
<!doctype html>
<html>
  <head>
    <title>Login | ShopEasy</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      :root {
        --primary-color: #302551;
      }
    </style>
  </head>

  <body
    class="min-h-screen bg-gradient-to-br from-gray-100 to-gray-200 flex items-center justify-center"
  >
    <div class="w-full max-w-md">
      <!-- Brand -->
      <div class="text-center mb-8">
        <h1
          class="text-4xl font-extrabold text-[color:var(--primary-color)] tracking-wide"
        >
          ShopEasy Sellers
        </h1>
        <p class="text-gray-500 mt-2">Welcome back</p>
      </div>

      <!-- Card -->
      <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        {% if messages %} {% for message in messages %}
        <div
          id="flashMessage"
          class="fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded shadow-lg text-white text-sm font-semibold z-50 transition-all duration-500 backdrop-blur-md bg-opacity-80"
          style="background-color:
        {% if message.tags == 'success' %}#16a34a
        {% elif message.tags == 'error' %}#dc2626
        {% elif message.tags == 'warning' %}#f59e0b
        {% else %}#2563eb
        {% endif %};"
        >
          {{ message }}
        </div>

        <script>
          setTimeout(() => {
            const msg = document.getElementById("flashMessage");
            if (msg) msg.style.opacity = "0";
          }, 4000);
        </script>
        {% endfor %} {% endif %}

        <form method="POST" class="space-y-5">
          {% csrf_token %}

          <input
            type="text"
            name="username"
            placeholder="Username"
            class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-[color:var(--primary-color)] focus:outline-none transition"
          />

          <input
            type="password"
            name="password"
            placeholder="Password"
            class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-[color:var(--primary-color)] focus:outline-none transition"
          />

          <button
            type="submit"
            class="w-full bg-[color:var(--primary-color)] hover:bg-[#241b3e] text-white p-3 rounded-lg font-semibold shadow-md hover:shadow-lg transition"
          >
            Login
          </button>
        </form>

        <p class="text-center mt-6 text-sm text-gray-600">
          Don’t have an account?
          <a
            href="{%url 'seller_register'%}"
            class="text-[color:var(--primary-color)] font-semibold hover:underline"
          >
            Register
          </a>
        </p>
        <p class="text-center mt-6 text-sm text-gray-600">
          Want to check us out?
          <a
            href="{%url 'seller'%}"
            class="text-[color:var(--primary-color)] font-semibold hover:underline"
          >
            Welcome Sellers
          </a>
        </p>
      </div>
    </div>
  </body>
</html>
