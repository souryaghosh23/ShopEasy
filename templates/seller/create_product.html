{% load static %}
<!doctype html>
<html>
  <head>
    <title>List Product | ShopEasy</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      :root {
        --primary-color: #302551;
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <!-- Header -->
    <header class="bg-[color:var(--primary-color)] py-4">
      <div class="max-w-screen-xl mx-auto px-6">
        <a href="{% url 'Home' %}" class="text-white text-2xl font-bold">
          ShopEasy
        </a>
      </div>
    </header>

    <section class="py-16">
      <div class="max-w-2xl mx-auto bg-white shadow-xl rounded-2xl p-10">
        <h2 class="text-3xl font-bold mb-8 text-center">List a New Product</h2>

        {% if messages %} {% for message in messages %}
        <div
          id="flashMessage"
          class="fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded shadow-lg text-white text-sm font-semibold z-50 transition-all duration-500 backdrop-blur-md bg-opacity-80"
          style="background-color:
        {% if message.tags == 'success' %}#16a34a
        {% elif message.tags == 'error' %}#dc2626
        {% elif message.tags == 'warning' %}#f59e0b
        {% else %}#2563eb
        {% endif %};"
        >
          {{ message }}
        </div>

        <script>
          setTimeout(() => {
            const msg = document.getElementById("flashMessage");
            if (msg) msg.style.opacity = "0";
          }, 4000);
        </script>
        {% endfor %} {% endif %}

        <form method="POST" enctype="multipart/form-data" class="space-y-6">
          {% csrf_token %}

          <!-- Name -->
          <div>
            <label class="block font-medium mb-2">Product Name *</label>
            <input
              type="text"
              name="name"
              class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-purple-500"
            />
          </div>

          <!-- Description -->
          <div>
            <label class="block font-medium mb-2">Description</label>
            <textarea
              name="description"
              rows="4"
              class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-purple-500"
            ></textarea>
          </div>

          <!-- Price -->
          <div>
            <label class="block font-medium mb-2">Price *</label>
            <input
              type="number"
              step="0.01"
              name="price"
              class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-purple-500"
            />
          </div>

          <!-- Quantity -->
          <div>
            <label class="block font-medium mb-2">Quantity *</label>
            <input
              type="number"
              name="quantity"
              class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-purple-500"
            />
          </div>

          <!-- Expiry -->
          <div>
            <label class="block font-medium mb-2">Expiry Date (Optional)</label>
            <input
              type="date"
              name="expiry_date"
              class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-purple-500"
            />
          </div>

          <!-- Image -->
          <div>
            <label class="block font-medium mb-2">Product Image *</label>
            <input
              type="file"
              name="image"
              class="w-full border rounded-lg p-3 bg-gray-50"
            />
          </div>

          <!-- Submit -->
          <div class="text-center">
            <button
              type="submit"
              class="bg-orange-500 hover:bg-orange-600 text-white px-8 py-3 rounded-lg font-semibold transition"
            >
              List Product
            </button>
          </div>
        </form>
      </div>
    </section>
  </body>
</html>
