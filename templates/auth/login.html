<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login | ShopEase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --primary-color: #302551;
        --primary-hover: #241b3d; /* slightly darker for hover */
      }
    </style>
  </head>
  <body class="bg-gray-100 font-sans">
    <div class="flex items-center justify-center min-h-screen">
      <div class="bg-white shadow-2xl rounded-lg w-full max-w-md p-8">
        <h2
          class="text-3xl font-bold text-center text-[color:var(--primary-color)] mb-6"
        >
          Login To Your Account
        </h2>

        <!-- ✅ Message Display Block -->
        {% if messages %} {% for message in messages %}
        <div
          id="flashMessage"
          class="fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded shadow-lg text-white text-sm font-semibold z-50 transition-all duration-500 backdrop-blur-md bg-opacity-80"
          style="background-color:
        {% if message.tags == 'success' %}#16a34a
        {% elif message.tags == 'error' %}#dc2626
        {% elif message.tags == 'warning' %}#f59e0b
        {% else %}#2563eb
        {% endif %};"
        >
          {{ message }}
        </div>

        <script>
          setTimeout(() => {
            const msg = document.getElementById("flashMessage");
            if (msg) msg.style.opacity = "0";
          }, 4000);
        </script>
        {% endfor %} {% endif %}

        <form method="POST" action="{% url 'Login' %}" class="space-y-6">
          {% csrf_token %}

          <!-- Email or Username -->
          <div>
            <label for="userid" class="block text-sm font-medium text-gray-700">
              User ID (Email or Username)
            </label>
            <input
              type="text"
              name="userid"
              id="userid"
              required
              class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-[color:var(--primary-color)] focus:border-[color:var(--primary-color)] shadow-sm"
            />
          </div>

          <!-- Password -->
          <div>
            <label
              for="password"
              class="block text-sm font-medium text-gray-700"
            >
              Password
            </label>
            <input
              type="password"
              name="password"
              id="password"
              required
              class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-[color:var(--primary-color)] focus:border-[color:var(--primary-color)] shadow-sm"
            />
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            class="w-full py-2 px-4 bg-[color:var(--primary-color)] text-white font-semibold rounded-md hover:bg-[color:var(--primary-hover)] transition"
          >
            Log In
          </button>

          <div class="flex items-center justify-between text-sm mt-2">
            <label class="flex items-center text-gray-700">
              <input
                id="remember"
                name="remember"
                type="checkbox"
                class="h-4 w-4 text-[color:var(--primary-color)] focus:ring-[color:var(--primary-color)] border-gray-300 rounded"
              />
              <span class="ml-2">Remember me</span>
            </label>

            <a
              href="{% url 'password_reset' %}"
              class="text-[color:var(--primary-color)] hover:underline font-medium"
            >
              Forgot password?
            </a>
          </div>

          <p class="text-center text-sm text-gray-600 mt-4 margin-bottom:1px;">
            Don't have an account?
            <a
              href="{% url 'Register' %}"
              class="text-[color:var(--primary-color)] hover:underline"
            >
              Register
            </a>
          </p>
          <p class="text-center text-sm text-gray-600 mt-4">
            No Account? We got you!<br />
            <a
              href="{% url 'Home' %}"
              class="text-[color:var(--primary-color)] hover:underline"
            >
              Shopeasy
            </a>
          </p>
        </form>
      </div>
    </div>
  </body>
</html>
